<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f4f4ef" />
    <meta name="description" content="IT Studio 校园招新——把想法编译成现实。" />
    <title>IT Studio / 校园招新</title>
    <style>
      /* 开屏黑幕，纯 CSS，不依赖任何框架 */
      #__splash {
        position: fixed; inset: 0; z-index: 99999;
        background: #272727; color: #fff;
        display: flex; align-items: center; justify-content: center;
        font-family: 'Inter', system-ui, sans-serif;
        transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      }
      #__splash.exit { transform: translateY(-100%); }

      #__splash .inner { position: relative; z-index: 1; text-align: center; }

      #__splash .brand {
        display: flex; align-items: baseline; justify-content: center;
        gap: 6px; margin-bottom: 40px;
      }
      #__splash .brand span {
        background: #c5e801; color: #000;
        font-weight: 900; font-size: 32px;
        padding: 7px 6px; letter-spacing: -2px;
      }
      #__splash .brand strong {
        font-weight: 900; letter-spacing: -1px; font-size: 24px;
      }

      #__splash .bar {
        width: 300px; height: 3px;
        background: rgba(255,255,255,.12);
        border-radius: 2px; overflow: hidden; margin: 0 auto;
      }
      #__splash .bar-fill {
        height: 100%; width: 0%;
        background: linear-gradient(90deg, #c5e801, #fff);
        border-radius: 2px; box-shadow: 0 0 12px #c5e801;
      }

      #__splash .label {
        margin-top: 16px; font-size: 11px; font-weight: 700;
        letter-spacing: 0.14em; color: rgba(255,255,255,.55);
        font-family: 'Courier New', monospace;
      }

      /* 全屏十字准心 */
      #__splash .crosshair-wrap {
        position: absolute; z-index: 0; pointer-events: none;
        width: 200vw; height: 200vh;
      }
      #__splash .crosshair-wrap .ch-h {
        display: block; position: absolute;
        left: 0; top: 50%;
        width: 100%; height: 1px;
        background: rgba(255,255,255,.18);
      }
      #__splash .crosshair-wrap .ch-v {
        display: block; position: absolute;
        left: 50%; top: 0;
        width: 1px; height: 100%;
        background: rgba(255,255,255,.18);
      }

      /* 背景 IT Logo 剪影 */
      #__splash .silhouette {
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
        pointer-events: none; z-index: 0;
      }
      #__splash .silhouette svg {
        width: min(420px, 70vw);
        opacity: 0.06;
      }
      @media (max-width: 640px) {
        #__splash .bar { width: 240px; }
        #__splash .brand span { font-size: 26px; padding: 5px 4px; }
        #__splash .brand strong { font-size: 20px; }
      }
      @media (prefers-reduced-motion: reduce) {
        #__splash { transition: none; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <!-- 开屏动画：在 Vue 启动前就已渲染 -->
    <div id="__splash" aria-label="加载中">
      <!-- 全屏十字准心：从左下向右上移动 -->
      <div class="crosshair-wrap" id="__splash-crosshair" aria-hidden="true">
        <span class="ch-h"></span>
        <span class="ch-v"></span>
      </div>

      <!-- 背景 IT Logo 剪影 -->
      <div class="silhouette" aria-hidden="true">
        <svg viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="200,30 370,120 370,280 200,370 30,280 30,120"
                   stroke="#c5e801" stroke-width="3" opacity="0.2"/>
          <polygon points="200,80 320,145 320,255 200,320 80,255 80,145"
                   stroke="#c5e801" stroke-width="2" opacity="0.5"/>
          <!-- IT 字母 -->
          <rect x="165" y="135" width="10" height="130" rx="2" fill="#c5e801"/>
          <rect x="200" y="135" width="70" height="10" rx="2" fill="#c5e801"/>
          <rect x="230" y="135" width="10" height="130" rx="2" fill="#c5e801"/>
          <!-- 装饰 -->
          <line x1="150" y1="290" x2="250" y2="290" stroke="#c5e801" stroke-width="1" opacity="0.4"/>
          <circle cx="200" cy="110" r="3" fill="#c5e801" opacity="0.6"/>
          <circle cx="200" cy="310" r="3" fill="#c5e801" opacity="0.6"/>
          <circle cx="80" cy="200" r="2" fill="#c5e801" opacity="0.4"/>
          <circle cx="320" cy="200" r="2" fill="#c5e801" opacity="0.4"/>
        </svg>
      </div>

      <div class="inner">
        <div class="brand"><span>IT</span><strong>STUDIO</strong></div>
        <div class="bar"><div class="bar-fill" id="__splash-bar"></div></div>
        <div class="label" id="__splash-label">LOADING 0%</div>
      </div>
    </div>

    <script>
      // 开屏动画：进度条 + 黑幕向上滑出
      (function() {
        var SKEY = 'itstudio-splash-done';
        if (sessionStorage.getItem(SKEY)) {
          var el = document.getElementById('__splash');
          if (el) el.remove();
          return;
        }

        // 全屏十字准心，200vw容器，交点位置 = (left + 100vw, top + 100vh)
        var crosshair = document.getElementById('__splash-crosshair');
        // 起始：交点在最右下角 → 终点：左上角（留 15vw/15vh 边距）
        var chStartX = 0; var chStartY = 0;
        var chEndX = -85; var chEndY = -85;

        var fill = document.getElementById('__splash-bar');
        var label = document.getElementById('__splash-label');
        var splash = document.getElementById('__splash');
        var DURATION = 2000;
        var startTime = performance.now();

        function tick(now) {
          var elapsed = now - startTime;
          var t = Math.min(elapsed / DURATION, 1);
          var eased = 1 - Math.pow(1 - t, 3);
          var p = Math.round(eased * 100);

          fill.style.width = p + '%';
          label.textContent = 'LOADING ' + p + '%';

          // 全屏十字：右下→左上，easeInOut 急停曲线，中间快
          var chEased = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
          crosshair.style.left = (chStartX + (chEndX - chStartX) * chEased) + 'vw';
          crosshair.style.top = (chStartY + (chEndY - chStartY) * chEased) + 'vh';

          if (t < 1) {
            requestAnimationFrame(tick);
          } else {
            setTimeout(function() {
              requestAnimationFrame(function() {
                requestAnimationFrame(function() {
                  splash.classList.add('exit');
                });
              });
            }, 400);
          }
        }
        requestAnimationFrame(tick);

        splash.addEventListener('transitionend', function() {
          splash.remove();
          sessionStorage.setItem(SKEY, '1');
        }, { once: true });
      })();
    </script>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
